kind = "web"
previewPath = "/nexora-report/"
title = "Nexora — Relatório de Progresso"
version = "1.0.0"
id = "artifacts/nexora-report"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/nexora-report/" ]
localPort = 21865

[services.development]
run = "pnpm --filter @workspace/nexora-report run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexora-report", "run", "build" ]
publicDir = "artifacts/nexora-report/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21865"
BASE_PATH = "/nexora-report/"
