openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Nexora AI Business OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: business-health
  - name: contracts
  - name: customer-success
  - name: crm
  - name: tickets
  - name: hr
  - name: finance
  - name: field-service
  - name: omnichannel
  - name: ai
  - name: gamification
  - name: automations

paths:
  /auth/user:
    get:
      tags: [auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserEnvelope"

  /login:
    get:
      tags: [auth]
      operationId: beginBrowserLogin
      summary: Start the OIDC login flow
      responses:
        "302":
          description: Redirect to OIDC provider

  /logout:
    get:
      tags: [auth]
      operationId: logoutBrowserSession
      summary: Clear session and logout
      responses:
        "302":
          description: Redirect after logout

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Business Health Score
  /business-health/score:
    get:
      operationId: getBusinessHealthScore
      tags: [business-health]
      summary: Get full Business Health Score™ with all dimensions
      responses:
        "200":
          description: Business Health Score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessHealthScore"

  /business-health/history:
    get:
      operationId: getBusinessHealthHistory
      tags: [business-health]
      summary: Get historical BHS over time
      responses:
        "200":
          description: History
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  # Contracts
  /contracts:
    get:
      operationId: getContracts
      tags: [contracts]
      summary: List contracts
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Contracts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
    post:
      operationId: createContract
      tags: [contracts]
      summary: Create contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  /contracts/summary:
    get:
      operationId: getContractsSummary
      tags: [contracts]
      summary: Contracts summary KPIs
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractsSummary"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get contract by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    patch:
      operationId: updateContract
      tags: [contracts]
      summary: Update contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContractInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    delete:
      operationId: deleteContract
      tags: [contracts]
      summary: Delete contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Customer Success
  /customer-success/nps:
    get:
      operationId: getNpsData
      tags: [customer-success]
      summary: Get NPS responses and summary
      responses:
        "200":
          description: NPS data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpsData"
    post:
      operationId: createNpsResponse
      tags: [customer-success]
      summary: Submit NPS response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NpsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpsResponse"

  /customer-success/clients:
    get:
      operationId: getClientHealthScores
      tags: [customer-success]
      summary: List clients with health scores
      responses:
        "200":
          description: Clients health
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientHealth"

  /customer-success/churn-risk:
    get:
      operationId: getChurnRisk
      tags: [customer-success]
      summary: Get clients at churn risk
      responses:
        "200":
          description: Churn risk clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChurnRiskClient"

  /customer-success/summary:
    get:
      operationId: getCustomerSuccessSummary
      tags: [customer-success]
      summary: Customer Success KPI summary
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSuccessSummary"

  # Dashboard
  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      tags: [dashboard]
      summary: Get live dashboard metrics
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"

  /dashboard/revenue-chart:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Get revenue chart data
      responses:
        "200":
          description: Revenue chart
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  /dashboard/business-health:
    get:
      operationId: getBusinessHealth
      tags: [dashboard]
      summary: Get business health score
      responses:
        "200":
          description: Business health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessHealth"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Recent activity feed
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # CRM
  /crm/leads:
    get:
      operationId: getLeads
      tags: [crm]
      summary: List leads
      parameters:
        - name: stage
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Leads list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [crm]
      summary: Create lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /crm/leads/{id}:
    get:
      operationId: getLead
      tags: [crm]
      summary: Get lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    patch:
      operationId: updateLead
      tags: [crm]
      summary: Update lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
    delete:
      operationId: deleteLead
      tags: [crm]
      summary: Delete lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /crm/pipeline:
    get:
      operationId: getPipeline
      tags: [crm]
      summary: Get pipeline grouped by stage with totals
      responses:
        "200":
          description: Pipeline stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineStage"

  /crm/contacts:
    get:
      operationId: getContacts
      tags: [crm]
      summary: List contacts
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [crm]
      summary: Create contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /crm/contacts/{id}:
    patch:
      operationId: updateContact
      tags: [crm]
      summary: Update contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [crm]
      summary: Delete contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Service Desk / Tickets
  /tickets:
    get:
      operationId: getTickets
      tags: [tickets]
      summary: List tickets
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: priority
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"
    post:
      operationId: createTicket
      tags: [tickets]
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/{id}:
    get:
      operationId: getTicket
      tags: [tickets]
      summary: Get ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
    patch:
      operationId: updateTicket
      tags: [tickets]
      summary: Update ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  /tickets/stats:
    get:
      operationId: getTicketStats
      tags: [tickets]
      summary: Ticket statistics and SLA summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketStats"

  # HR
  /hr/employees:
    get:
      operationId: getEmployees
      tags: [hr]
      summary: List employees
      parameters:
        - name: department
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [hr]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /hr/employees/{id}:
    patch:
      operationId: updateEmployee
      tags: [hr]
      summary: Update employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /hr/overview:
    get:
      operationId: getHrOverview
      tags: [hr]
      summary: HR overview and productivity metrics
      responses:
        "200":
          description: HR overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrOverview"

  # Finance
  /finance/overview:
    get:
      operationId: getFinanceOverview
      tags: [finance]
      summary: Financial overview
      responses:
        "200":
          description: Finance overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceOverview"

  /finance/transactions:
    get:
      operationId: getTransactions
      tags: [finance]
      summary: List transactions
      parameters:
        - name: type
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [finance]
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /finance/cashflow:
    get:
      operationId: getCashflowChart
      tags: [finance]
      summary: Cashflow chart data
      responses:
        "200":
          description: Cashflow data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  # Field Service / Work Orders
  /field-service/orders:
    get:
      operationId: getWorkOrders
      tags: [field-service]
      summary: List work orders
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: technicianId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkOrder"
    post:
      operationId: createWorkOrder
      tags: [field-service]
      summary: Create work order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /field-service/orders/{id}:
    patch:
      operationId: updateWorkOrder
      tags: [field-service]
      summary: Update work order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOrder"

  /field-service/technicians:
    get:
      operationId: getTechnicians
      tags: [field-service]
      summary: List technicians with location
      responses:
        "200":
          description: Technicians
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Technician"

  # Omnichannel
  /omnichannel/conversations:
    get:
      operationId: getConversations
      tags: [omnichannel]
      summary: List conversations
      parameters:
        - name: channel
          in: query
          schema:
            type: ["string", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  /omnichannel/conversations/{id}/messages:
    get:
      operationId: getMessages
      tags: [omnichannel]
      summary: Get messages in conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [omnichannel]
      summary: Send message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  # AI Brain
  /ai/insights:
    get:
      operationId: getAiInsights
      tags: [ai]
      summary: Get AI-generated business insights
      responses:
        "200":
          description: AI insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiInsight"

  /ai/chat:
    post:
      operationId: chatWithAi
      tags: [ai]
      summary: Chat with Nexora Brain AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatInput"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"

  # Gamification
  /gamification/ranking:
    get:
      operationId: getGamificationRanking
      tags: [gamification]
      summary: Get leaderboard rankings
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Ranking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RankingEntry"

  # Automations
  /automations:
    get:
      operationId: getAutomations
      tags: [automations]
      summary: List automations
      responses:
        "200":
          description: Automations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Automation"
    post:
      operationId: createAutomation
      tags: [automations]
      summary: Create automation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"

  /automations/{id}:
    patch:
      operationId: updateAutomation
      tags: [automations]
      summary: Update automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Automation"
    delete:
      operationId: deleteAutomation
      tags: [automations]
      summary: Delete automation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # Dashboard
    DashboardMetrics:
      type: object
      required: [revenue, openTickets, activeContracts, teamProductivity, salesCount, slaCompliance, aiInsightsCount, businessHealthScore]
      properties:
        revenue:
          type: number
        revenueChange:
          type: number
        openTickets:
          type: integer
        contractsProtected:
          type: number
        activeContracts:
          type: integer
        teamProductivity:
          type: number
        salesCount:
          type: integer
        slaCompliance:
          type: number
        aiInsightsCount:
          type: integer
        businessHealthScore:
          type: number

    ChartPoint:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: number
        secondary:
          type: ["number", "null"]

    BusinessHealth:
      type: object
      required: [score, financial, commercial, support, hr, operations]
      properties:
        score:
          type: number
        financial:
          type: number
        commercial:
          type: number
        support:
          type: number
        hr:
          type: number
        operations:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, timestamp]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        timestamp:
          type: string
        icon:
          type: ["string", "null"]
        color:
          type: ["string", "null"]

    # CRM
    Lead:
      type: object
      required: [id, name, email, stage, value, probability, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        stage:
          type: string
        value:
          type: number
        probability:
          type: integer
        aiScore:
          type: ["integer", "null"]
        assignedTo:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    LeadInput:
      type: object
      required: [name, email, stage, value]
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        stage:
          type: string
        value:
